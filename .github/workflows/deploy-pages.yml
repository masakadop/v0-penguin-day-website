name: Deploy Next.js site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      enable_step_debug:
        description: "Enable ACTIONS_STEP_DEBUG for manual runs"
        required: false
        default: false
        type: boolean

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    permissions:
      contents: read
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_step_debug && 'true' || 'false' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # Next.js 16 build is validated on Node 20 in this repo.
          # Pinning to LTS avoids CI-only breakage from Node 22 runtime differences.
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static export
        run: pnpm build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: out

      - name: Upload debug build artifact on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: pages-build-debug-out
          path: out
          if-no-files-found: warn
          retention-days: 7

  deploy:
    permissions:
      pages: write
      id-token: write
    timeout-minutes: 15
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    env:
      ACTIONS_STEP_DEBUG: ${{ github.event_name == 'workflow_dispatch' && inputs.enable_step_debug && 'true' || 'false' }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
